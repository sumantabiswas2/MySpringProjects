# ~/GitHub/sumantabiswas2/spring-boot-dual-database/docker-compose.yml



services:
  # ============================================
  # DATABASES
  # ============================================

  # MySQL Database
  mysql:
    image: mysql:9.7.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: adminadmin
      MYSQL_DATABASE: ecommerce_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d  # Optional: initialization scripts
    #command: --mysql-native-password=ON
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j Database
  neo4j:
    image: neo4j:5.26
    container_name: neo4j
    restart: always
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "adminadmin", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB (Optional - if you want to add it)
  mongodb:
    image: mongo:8.3
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (For caching)
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - redis_backups:/backups
    command: redis-server --appendonly yes --save 60 1
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # OBSERVABILITY STACK
  # ============================================

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: always
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./docker/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4318:4318"   # OTLP HTTP receiver
      - "4317:4317"   # OTLP gRPC receiver
      - "8889:8889"   # Prometheus metrics exposed by the collector
    networks:
      - app-network
    depends_on:
      - prometheus
      - tempo
      - loki

  # Prometheus (Metrics Database)
  prometheus:
    image: prom/prometheus:v3.5.3
    container_name: prometheus
    restart: always
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  # Tempo (Traces Database)
  tempo:
    image: grafana/tempo:3.0.0
    container_name: tempo
    restart: always
    command: ["-target=all", "-config.file=/etc/tempo-config.yml"]
    volumes:
      - ./docker/tempo-config.yml:/etc/tempo-config.yml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "9411:9411"   # Zipkin compatibility
    networks:
      - app-network

  # Loki (Logs Database)
  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./docker/loki-config.yml:/etc/loki/loki-config.yml
    networks:
      - app-network

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:13.0.3
    container_name: grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - prometheus
      - tempo
      - loki

# Vault Hashi Corp server
  vault:
    image: hashicorp/vault:1.15.4 # [Certain] Always pin a specific version, never use 'latest'
    container_name: hashicorp-vault
    ports: 
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "my-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - vault_data:/vault/file
      - vault_logs:/vault/logs
    cap_add:
      - IPC_LOCK # Prevents Vault memory from being swapped to disk (Security best practice)
    restart: unless-stopped

# ============================================
# VOLUMES (Persistent Data)
# ============================================
volumes:
  # Database volumes
  mysql_data:
    name: ${PROJECT_NAME:-spring-boot}_mysql_data
    labels:
      - "com.project=spring-boot-dual-database"
      - "com.service=mysql"
  neo4j_data:
    name: ${PROJECT_NAME:-spring-boot}_neo4j_data
    labels:
      - "com.project=spring-boot-dual-database"
      - "com.service=neo4j"
  neo4j_logs:
    name: ${PROJECT_NAME:-spring-boot}_neo4j_logs
  mongodb_data:
    name: ${PROJECT_NAME:-spring-boot}_mongodb_data
  redis_data:
    name: ${PROJECT_NAME:-spring-boot}_redis_data
  redis_backups:
    name: ${PROJECT_NAME:-spring-boot}_redis_backups

  # Observability volumes
  prometheus_data:
    name: ${PROJECT_NAME:-spring-boot}_prometheus_data
    labels:
      - "com.project=spring-boot-dual-database"
      - "com.service=prometheus"
  tempo_data:
    name: ${PROJECT_NAME:-spring-boot}_tempo_data
  loki_data:
    name: ${PROJECT_NAME:-spring-boot}_loki_data
  grafana_data:
    name: ${PROJECT_NAME:-spring-boot}_grafana_data

  # Vault configurations
  vault_data:
    name: ${PROJECT_NAME:-spring-boot}_vault_data
  vault_logs:
    name: ${PROJECT_NAME:-spring-boot}_vault_logs

# ============================================
# NETWORKS
# ============================================
networks:
  app-network:
    name: ${PROJECT_NAME:-spring-boot}_network
    driver: bridge