stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

metrics_generator:
  registry:
    collection_interval: 5s
  storage:
    path: /var/tempo/generator/wal
  processor:
    span_metrics: {}

backend_scheduler:
  provider:
    compaction:
      compaction:
        block_retention: 48h
