# application.yml
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC
    username: root
    password: adminadmin
    driver-class-name: com.mysql.cj.jdbc.Driver

# Neo4j configurations  
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: adminadmin

# JPA configurations		
  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        #dialect: org.hibernate.dialect.MySQL8Dialect # -- Caused Failures --
        format_sql: true
        use_sql_comments: true

# Important for multiple data sources
  main:
    allow-bean-definition-overriding: true 

  application:
    name: spring-boot-dual-database

# Logging	
logging:
  level:
    org.springframework.data.neo4j: DEBUG 
    com.example.dualdb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.cache: DEBUG

# Cache Configuration
  cache:
    type: caffeine  # or 'redis' for distributed caching
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m,recordStats

# Redis Configuration (if using Redis)
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0		

# Observability and metrics
  management:
    endpoints:
      web:
        exposure:
          include: "*" # In production, restrict to 'health, info, prometheus'
    otlp:
      metrics:
        export:
          url: http://localhost:4318/v1/metrics
    opentelemetry:
      tracing:
        export:
          otlp:
            endpoint: http://localhost:4318/v1/traces
      logging:
        export:
          otlp:
            endpoint: http://localhost:4318/v1/logs
    metrics:
      tags:
        application: ${spring.application.name} # Tag all metrics with your app's name

# GraphQL
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      printer:
        enabled: true
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true
    websocket:
      path: /graphql
    playground:
      enabled: true
      path: /playground