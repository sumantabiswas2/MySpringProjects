# application.yml
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC
    username: root
    password: adminadmin

# Neo4j configurations  

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: adminadmin

# Persistance configurations		
  jpa:
    show-sql: true

  main:
    allow-bean-definition-overriding: true # Important for multiple data sources

  application:
    name: spring-boot-dual-database

# Logging	
logging:
  level:
    org.springframework.data.neo4j: DEBUG 
    com.example.dualdb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.cache: DEBUG