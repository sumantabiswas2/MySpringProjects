# application.yml
#server:
  #port: 9086
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: adminadmin
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Neo4j configurations
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: adminadmin

  # JPA configurations
  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        #dialect: org.hibernate.dialect.MySQL8Dialect # -- Caused Failures --
        format_sql: true
        use_sql_comments: true

  # Important for multiple data sources
  main:
    allow-bean-definition-overriding: true

  application:
    name: spring-boot-dual-database

  # Cache Configuration
  cache:
    type: caffeine  # or 'redis' for distributed caching
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m,recordStats

  # Redis Configuration (if using Redis)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # GraphQL
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      printer:
        enabled: true
    #cors:
      #allowed-origins: "*"
      #allowed-methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      #allowed-headers: ["Authorization", "Content-Type", "Accept", "Origin", "X-Requested-With"]
      #allow-credentials: true
    websocket:
      path: /graphql
    playground:
      enabled: true
      path: /playground


  # Vault- HashiCorp configurations
  cloud:
    vault:
      uri: http://localhost:8200
      authentication: TOKEN
      token: my-root-token
      kv:
        enabled: true
        # check md file
        backend: secret 
        default-context: my-company/development/spring-boot-dual-database  
    config:
      import: "vault://"



# Logging
logging:
  level:
    org.springframework.data.neo4j: DEBUG
    com.example.dualdb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.cache: DEBUG

# Observability and metrics
management:
  endpoints:
    web:
      exposure:
        include: "*" # In production, restrict to 'health, info, prometheus'
  otlp:
    metrics:
      export:
        enabled: false  # Disable OTLP metrics export
        url: http://localhost:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
  metrics:
    tags:
      application: ${spring.application.name} # Tag all metrics with your app's name

# Swagger
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
    groups:
      enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    display-request-duration: true
    groups-order: asc
  show-actuator: true
  show-login-endpoint: true
  packages-to-scan: com.example.dualdb.controller
  paths-to-match: /api/**, /graphql/**




